      - esp32s2_V6_8_1
      - esp32s2_V6_9_0
      - esp32s2_V6_10_0
      - esp32s2_V6_11_0
      - esp32s2_V6_12_0
      - esp32s2_V6_13_0
      - esp32s3_V6_5_0
