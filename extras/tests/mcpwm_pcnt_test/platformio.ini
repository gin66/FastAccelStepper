; Standalone MCPWM + PCNT test for ESP-IDF 5.3 (Arduino framework)
; Verifies GPIO routing from MCPWM output to PCNT input
; No dependency on FastAccelStepper

[platformio]

[env:esp32_pioarduino_V53_03_11]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.11/platform-espressif32.zip
board = esp32dev
framework = arduino
build_flags = -Wall
board_build.f_cpu = 240000000L
monitor_speed = 115200
monitor_port = /dev/cu.usbserial-0001
upload_port = /dev/cu.usbserial-0001
