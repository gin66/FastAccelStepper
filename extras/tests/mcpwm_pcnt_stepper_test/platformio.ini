; Test MCPWM/PCNT driver via FastAccelStepper API on ESP-IDF 5.3
;
; Wiring:
;   GPIO14 = step  (logic analyzer CH0)
;   GPIO15 = direction (logic analyzer CH1)
;
; Usage:
;   1. Build and flash
;   2. Serial monitor: expect "PASS" if pulses received on PCNT
;   3. Check logic analyzer for proper step/dir signals

[platformio]

[env:esp32_pioarduino_V53_03_11]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.11/platform-espressif32.zip
board = esp32dev
framework = arduino
build_flags = -Wall
board_build.f_cpu = 240000000L
monitor_speed = 115200
monitor_port = /dev/cu.usbserial-0001
upload_port = /dev/cu.usbserial-0001
lib_extra_dirs = ../../../..
