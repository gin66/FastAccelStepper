; PlatformIO Project Configuration File
; ESP32 StepperDemo with WebUI
; Target: ESP-IDF v5.3+

[platformio]
; Default environment
default_envs = esp32_pioarduino_V53_03_11

; Base configuration
[env]
framework = arduino
monitor_speed = 115200
board_build.f_cpu = 240000000L

build_flags = 
    -Wall
    -DCORE_DEBUG_LEVEL=ARDUHAL_LOG_LEVEL_INFO
    -DASYNCWEBSERVER_REGEX

; Library dependencies
lib_deps = 
    https://github.com/me-no-dev/ESPAsyncWebServer.git
    https://github.com/me-no-dev/AsyncTCP.git
    bblanchon/ArduinoJson @ ^7.0.0

; Library dependency finder mode - deep mode for better dependency resolution
lib_ldf_mode = deep

; Don't archive libraries to avoid dependency issues
lib_archive = false

; ESP32 with pioarduino platform (ESP-IDF v5.3 based)
[env:esp32_pioarduino_V53_03_11]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.11/platform-espressif32.zip
board = esp32dev
board_build.partitions = huge_app.csv
; Reference the FastAccelStepper library using symlink or relative path
; This uses the lib symlink in lib/FastAccelStepper
lib_extra_dirs = lib

; Standard PlatformIO environments for testing
[env:esp32_V6_13_0]
platform = espressif32 @ 6.13.0
board = esp32dev
lib_extra_dirs = lib

[env:esp32s3_V6_13_0]
platform = espressif32 @ 6.13.0
board = esp32-s3-devkitc-1
build_flags = 
    ${env.build_flags}
    -DARDUINO_USB_CDC_ON_BOOT=1
lib_extra_dirs = lib

[env:esp32c3_V6_13_0]
platform = espressif32 @ 6.13.0
board = esp32-c3-devkitm-1
build_flags = 
    ${env.build_flags}
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
lib_extra_dirs = lib
